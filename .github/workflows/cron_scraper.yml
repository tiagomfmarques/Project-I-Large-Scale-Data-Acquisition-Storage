name: Automacao Diaria de Scraping

on:
  schedule:
    - cron: '0 20 * * *' # Executa diariamente às 20:00 UTC
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests selenium webdriver-manager

      - name: Executar Pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # O script deve rodar em modo 'headless' no GitHub Actions
          python src/scrapers/run_pipeline.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Scraper"
          git config --global user.email "actions@github.com"
          git add data/raw/*.json
          git commit -m "Auto-update: Novos artigos e datasets [$(date +'%Y-%m-%d')]" || true
          git pull --rebase origin main
          git push origin main